<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/pages/main.css" />
</head>
<body>
  <main id="main-page" class="page page-main">
    <article class="letter-wrapper">
      <header class="letter-header">
        <h1 id="letter-title" class="letter-title">
          To You
        </h1>
      </header>

      <section id="letter-content" class="letter-content">
        <p class="letter-paragraph">
          This is where the words begin. Quietly, honestly, without rushing.
        </p>
        <p class="letter-paragraph">
          Each sentence is meant to be felt rather than read, as if time slows
          down just enough for the meaning to settle.
        </p>
        <p class="letter-paragraph">
          What comes next will be shaped later, but the space is here now,
          waiting gently.
        </p>
      </section>

      <nav class="letter-navigation">
        <button id="letter-continue" class="letter-continue">
          Turn the page
        </button>
      </nav>

      <footer class="letter-footer"></footer>
    </article>
  </main>

  <script src="js/core/storage.js"></script>
  <script src="js/core/navigation.js"></script>
  <script src="js/pages/main.js"></script>
</body>
</html>
