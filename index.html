<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome Baby</title>

  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/pages/heart.css" />
</head>
<body>
  <main id="entry-page" class="page page-heart">
    <section class="center-wrapper">
      <header class="prompt">
        <h1 id="heart-prompt">Make My Heart Beat For You</h1>
      </header>

      <div class="heart-container">
        <img
          id="heart"
          class="heart"
          src="assets/images/heart.png"
          alt="Interactive heart"
        />
      </div>

      <footer class="progress">
        <p id="heart-progress"></p>
      </footer>
    </section>
  </main>

  <script src="js/core/storage.js"></script>
  <script src="js/core/navigation.js"></script>
  <script src="js/pages/heart.js"></script>
</body>
</html>
